[pytest]
# Pytest configuration for CCT MCP Server

# Test discovery patterns
python_files = test_*.py verify_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --disable-warnings
    --color=yes

# Markers
markers =
    domain: Domain layer tests (models, value objects, enums)
    application: Application layer tests (services, modes, orchestrators)
    infrastructure: Infrastructure layer tests (tools, utils, analysis, memory)
    integration: Integration tests
    verification: Whitepaper verification tests
    slow: Slow-running tests
    benchmark: Benchmark tests

# Coverage options (optional)
# addopts = --cov=src --cov-report=html --cov-report=term-missing
